<svg xmlns="http://www.w3.org/2000/svg" width="280" height="520" viewBox="0 0 280 520">
  <defs>
    <style>
      .font { font-family: 'Courier New', monospace; }
    </style>
    <!-- Window drop shadow -->
    <filter id="shadow" x="-10%" y="-5%" width="125%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Window body -->
  <rect x="10" y="10" width="260" height="500" rx="4" ry="4" fill="#0a0a0f" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="10" y="10" width="260" height="28" rx="4" ry="4" fill="#111118"/>
  <rect x="10" y="28" width="260" height="10" fill="#111118"/>
  <!-- Title bar bottom border -->
  <rect x="10" y="37" width="260" height="1" fill="#1e1e2e"/>

  <!-- Close button -->
  <text x="27" y="28" class="font" font-size="11" fill="#6868a0" text-anchor="middle">✕</text>
  <!-- Title -->
  <text x="145" y="28" class="font" font-size="9" fill="#6868a0" text-anchor="middle">PyRokuMe  v1.0.0</text>
  <!-- Pin button -->
  <text x="256" y="28" class="font" font-size="10" fill="#6868a0" text-anchor="middle">📌</text>
  <!-- Theme button -->
  <text x="241" y="28" class="font" font-size="10" fill="#6868a0" text-anchor="middle">🎨</text>

  <!-- Device bar -->
  <rect x="10" y="38" width="260" height="28" fill="#111118"/>
  <text x="22" y="56" class="font" font-size="8" fill="#39ff7f">Living Room TV  [192.168.2.42]</text>
  <rect x="218" y="43" width="28" height="16" rx="2" fill="#1e1e2e"/>
  <text x="232" y="54" class="font" font-size="7" fill="#00ffe5" text-anchor="middle">⌕ SCAN</text>
  <rect x="247" y="43" width="12" height="16" rx="2" fill="#1e1e2e"/>
  <text x="253" y="54" class="font" font-size="8" fill="#6868a0" text-anchor="middle">▾</text>
  <!-- WOL button -->
  <rect x="189" y="43" width="26" height="16" rx="2" fill="#1e1e2e"/>
  <text x="202" y="54" class="font" font-size="7" fill="#ffcc00" text-anchor="middle">⚡WOL</text>
  <!-- Device bar bottom border -->
  <rect x="10" y="66" width="260" height="1" fill="#1e1e2e"/>

  <!-- ── Row 0: Back / Home / Mute / Power ── -->
  <!-- Back -->
  <rect x="18" y="72" width="52" height="28" rx="3" fill="#1e1e2e"/>
  <text x="44" y="90" class="font" font-size="13" fill="#6868a0" text-anchor="middle">←</text>
  <!-- Home -->
  <rect x="76" y="72" width="52" height="28" rx="3" fill="#1e1e2e"/>
  <text x="102" y="90" class="font" font-size="13" fill="#6868a0" text-anchor="middle">⌂</text>
  <!-- Mute -->
  <rect x="134" y="72" width="52" height="28" rx="3" fill="#1e1e2e"/>
  <text x="160" y="90" class="font" font-size="13" fill="#ffcc00" text-anchor="middle">🔇</text>
  <!-- Power -->
  <rect x="192" y="72" width="56" height="28" rx="3" fill="#1e1e2e"/>
  <text x="220" y="90" class="font" font-size="13" fill="#ff3860" text-anchor="middle">⏻</text>

  <!-- separator -->
  <rect x="18" y="106" width="244" height="1" fill="#1e1e2e"/>

  <!-- ── D-Pad Up ── -->
  <rect x="98" y="112" width="84" height="34" rx="3" fill="#1e1e2e"/>
  <text x="140" y="134" class="font" font-size="15" fill="#6c2bd9" text-anchor="middle">▲</text>

  <!-- ── D-Pad Mid: Left / OK / Right ── -->
  <rect x="18" y="152" width="74" height="34" rx="3" fill="#1e1e2e"/>
  <text x="55" y="174" class="font" font-size="15" fill="#6c2bd9" text-anchor="middle">◀</text>

  <rect x="98" y="152" width="84" height="34" rx="3" fill="#1e1e2e"/>
  <text x="140" y="175" class="font" font-size="11" fill="#39ff7f" text-anchor="middle" font-weight="bold">OK</text>

  <rect x="188" y="152" width="74" height="34" rx="3" fill="#1e1e2e"/>
  <text x="225" y="174" class="font" font-size="15" fill="#6c2bd9" text-anchor="middle">▶</text>

  <!-- ── D-Pad Down ── -->
  <rect x="98" y="192" width="84" height="34" rx="3" fill="#1e1e2e"/>
  <text x="140" y="214" class="font" font-size="15" fill="#6c2bd9" text-anchor="middle">▼</text>

  <!-- separator -->
  <rect x="18" y="232" width="244" height="1" fill="#1e1e2e"/>

  <!-- ── Row: Ch- / Ch+ / Vol- / Vol+ ── -->
  <rect x="18" y="238" width="52" height="28" rx="3" fill="#1e1e2e"/>
  <text x="44" y="256" class="font" font-size="9" fill="#6868a0" text-anchor="middle">Ch−</text>

  <rect x="76" y="238" width="52" height="28" rx="3" fill="#1e1e2e"/>
  <text x="102" y="256" class="font" font-size="9" fill="#6868a0" text-anchor="middle">Ch+</text>

  <rect x="134" y="238" width="52" height="28" rx="3" fill="#1e1e2e"/>
  <text x="160" y="256" class="font" font-size="9" fill="#c792ea" text-anchor="middle">Vol−</text>

  <rect x="192" y="238" width="56" height="28" rx="3" fill="#1e1e2e"/>
  <text x="220" y="256" class="font" font-size="9" fill="#c792ea" text-anchor="middle">Vol+</text>

  <!-- ── Row: ⏮ ⏯ ⏭ ── -->
  <rect x="18" y="272" width="78" height="28" rx="3" fill="#1e1e2e"/>
  <text x="57" y="291" class="font" font-size="14" fill="#6868a0" text-anchor="middle">⏮</text>

  <rect x="102" y="272" width="76" height="28" rx="3" fill="#1e1e2e"/>
  <text x="140" y="291" class="font" font-size="14" fill="#39ff7f" text-anchor="middle">⏯</text>

  <rect x="184" y="272" width="78" height="28" rx="3" fill="#1e1e2e"/>
  <text x="223" y="291" class="font" font-size="14" fill="#6868a0" text-anchor="middle">⏭</text>

  <!-- separator -->
  <rect x="18" y="306" width="244" height="1" fill="#1e1e2e"/>

  <!-- ── Row: Apps / Info ── -->
  <rect x="18" y="312" width="120" height="28" rx="3" fill="#1e1e2e"/>
  <text x="78" y="330" class="font" font-size="9" fill="#00ffe5" text-anchor="middle">✦ Apps</text>

  <rect x="144" y="312" width="118" height="28" rx="3" fill="#1e1e2e"/>
  <text x="203" y="330" class="font" font-size="9" fill="#6868a0" text-anchor="middle">⌖ Info</text>

  <!-- ── Keyboard button ── -->
  <rect x="18" y="346" width="244" height="28" rx="3" fill="#1e1e2e"/>
  <text x="140" y="364" class="font" font-size="9" fill="#6868a0" text-anchor="middle">⌨ Send Text</text>

  <!-- separator -->
  <rect x="10" y="380" width="260" height="1" fill="#1e1e2e"/>

  <!-- Opacity slider row -->
  <rect x="10" y="381" width="260" height="28" fill="#111118"/>
  <text x="22" y="399" class="font" font-size="7" fill="#6868a0">OPACITY</text>
  <!-- slider track -->
  <rect x="72" y="392" width="160" height="3" rx="1" fill="#1e1e2e"/>
  <rect x="72" y="392" width="140" height="3" rx="1" fill="#6c2bd9"/>
  <circle cx="212" cy="393" r="5" fill="#00ffe5"/>
  <text x="244" y="399" class="font" font-size="7" fill="#00ffe5">88%</text>

  <!-- separator -->
  <rect x="10" y="408" width="260" height="1" fill="#1e1e2e"/>

  <!-- Status bar -->
  <rect x="10" y="409" width="260" height="20" fill="#111118"/>
  <text x="22" y="423" class="font" font-size="7" fill="#3a3a5c">Connected to Living Room TV</text>
  <!-- Resize grip dots -->
  <circle cx="253" cy="418" r="1" fill="#3a3a5c"/>
  <circle cx="258" cy="418" r="1" fill="#3a3a5c"/>
  <circle cx="258" cy="423" r="1" fill="#3a3a5c"/>

  <!-- Window bottom border rounding -->
  <rect x="10" y="495" width="260" height="15" rx="4" ry="4" fill="#0a0a0f"/>
</svg>
